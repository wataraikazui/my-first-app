<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食洗機占い｜あなたにぴったりの食洗機タイプ診断</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf8f5;
            --card: #ffffff;
            --primary: #5b8a72;
            --primary-light: #e8f0ec;
            --primary-dark: #3d6b54;
            --accent: #d4956a;
            --accent-light: #fdf0e8;
            --text: #3a3a3a;
            --text-light: #7a7a7a;
            --border: #e8e4df;
            --shadow: 0 2px 16px rgba(0,0,0,0.06);
            --shadow-hover: 0 4px 24px rgba(0,0,0,0.1);
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
        }

        /* ヘッダー */
        .header {
            text-align: center;
            padding: 48px 20px 32px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #f5ebe3 100%);
            border-bottom: 1px solid var(--border);
        }
        .header-icon { font-size: 48px; margin-bottom: 12px; }
        .header h1 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .header p {
            font-size: 14px;
            color: var(--text-light);
            max-width: 400px;
            margin: 0 auto;
        }

        /* プログレスバー */
        .progress-wrap {
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 20px 0;
        }
        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .progress-text {
            text-align: right;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* メインコンテナ */
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 質問カード */
        .question-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 24px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .q-number {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            background: var(--primary-light);
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        .q-label {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .q-text {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 24px;
            color: var(--text);
        }

        /* 選択肢 */
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            font-size: 15px;
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            line-height: 1.6;
        }
        .option-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }
        .option-btn:active {
            transform: translateY(0);
        }

        /* スタート画面 */
        .start-screen {
            text-align: center;
            padding: 40px 24px;
        }
        .start-screen h2 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 20px;
            margin-bottom: 16px;
            color: var(--primary-dark);
        }
        .start-screen p {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 28px;
            line-height: 1.8;
        }
        .start-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 16px 48px;
            font-size: 16px;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(91,138,114,0.3);
        }
        .start-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(91,138,114,0.4);
        }
        .start-note {
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-light);
        }

        /* 結果画面 */
        .result-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 24px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .result-badge {
            display: inline-block;
            background: var(--accent-light);
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        .result-type {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .result-description {
            font-size: 15px;
            color: var(--text);
            line-height: 1.8;
            margin-bottom: 20px;
            text-align: left;
        }
        .result-spec {
            background: var(--bg);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: left;
        }
        .result-spec h4 {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        .result-spec-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 4px 0;
            border-bottom: 1px dotted var(--border);
        }
        .result-spec-row:last-child { border: none; }
        .result-spec-label { color: var(--text-light); }
        .result-spec-value { font-weight: 600; color: var(--text); }
        .result-personality {
            background: var(--primary-light);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }
        .result-personality h4 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 14px;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }
        .result-personality p {
            font-size: 14px;
            color: var(--text);
            line-height: 1.8;
        }
        .runner-up {
            background: var(--bg);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .runner-up h4 {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        .runner-up p {
            font-size: 14px;
            color: var(--text);
        }
        .retry-btn {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 12px 36px;
            font-size: 14px;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .retry-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* フッター */
        .footer {
            text-align: center;
            padding: 32px 20px;
            font-size: 12px;
            color: var(--text-light);
        }
        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        /* 非表示ユーティリティ */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">🍽️</div>
    <h1>食洗機占い</h1>
    <p>10の質問に答えるだけで、あなたにぴったりの食洗機タイプと家づくりの傾向がわかります</p>
</div>

<div class="progress-wrap hidden" id="progressWrap">
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progressText">1 / 10</div>
</div>

<div class="container">
    <!-- スタート画面 -->
    <div id="startScreen" class="question-card start-screen">
        <h2>あなたの「食洗機タイプ」を<br>診断してみませんか？</h2>
        <p>選んだ食洗機で、あなたの家づくりの傾向がわかるかも。<br>所要時間は約2分、全10問です。</p>
        <button class="start-btn" onclick="startQuiz()">診断スタート</button>
        <p class="start-note">※ 結果は6タイプに分かれます</p>
    </div>

    <!-- 質問画面 -->
    <div id="quizScreen" class="hidden"></div>

    <!-- 結果画面 -->
    <div id="resultScreen" class="hidden"></div>
</div>

<div class="footer">
    <p>食洗機占い｜萩森建設</p>
</div>

<script>
// ===== データ定義 =====
const machines = [
    { id: 0, name: '60cmフロントオープン（金属ラック）', short: '60cmフロント金属', price: '60〜80万円', makers: 'Panasonic・ミーレ・ボッシュ・AEG・ガゲナウ', feature: '大容量まとめ洗い・途中追加しやすい・何でも洗える' },
    { id: 1, name: '45cmフロントオープン（金属ラック）', short: '45cmフロント金属', price: '40〜60万円', makers: 'Panasonic・ミーレ・ボッシュ', feature: '途中追加しやすい・静か・バランス型' },
    { id: 2, name: '45cmフロントオープン（樹脂ラック）', short: '45cmフロント樹脂', price: '15〜25万円', makers: 'リンナイ', feature: '途中追加しやすい・コスパ◎' },
    { id: 3, name: '45cm引出し式（深型）', short: '45cm引出し深型', price: '15〜25万円', makers: 'Panasonic・リンナイ', feature: 'まとめ洗い・立ったまま操作' },
    { id: 4, name: '45cm引出し式（浅型）', short: '45cm引出し浅型', price: '10〜20万円', makers: 'Panasonic・リンナイ', feature: 'ランニングコスト安・こまめ洗い向き' },
    { id: 5, name: '据え置き型', short: '据え置き', price: '〜10万円', makers: 'Panasonic', feature: '設置自由・交換コスト安・姿勢が楽' }
];

const typeProfiles = [
    {
        typeName: '妥協しない本格派',
        description: '「どうせ入れるなら、全部入れたい。」フライパンも鍋もまな板も。家づくりに対しても同じで、やると決めたら中途半端にしないタイプ。周りからは少しこだわりが強く見えることもあるけれど、それは暮らしの質に本気な証拠。でも本当は、「これでよかった」と安心したいだけなのかも。',
        personality: '家づくりでも「とことん」を選べる人。素材、設備、間取り、全部に納得してから進みたい。打ち合わせは長くなりがちだけど、完成後の満足度は誰よりも高い。'
    },
    {
        typeName: 'バランス感覚に優れたこだわり派',
        description: '「いいものが欲しい。でも、ちゃんと理由があるものを。」見た目も性能も妥協しないけれど、ただ高いものを選ぶわけじゃない。納得できる理由があれば投資するし、なければ引く。そのバランス感覚が家づくりにも表れる人。',
        personality: '情報収集が得意で、比較検討を楽しめるタイプ。「なんとなく」が嫌いで、選んだ理由をちゃんと説明できる。工務店との打ち合わせでは鋭い質問が飛んでくるかも。'
    },
    {
        typeName: '使い勝手で選ぶ合理主義者',
        description: '「高ければいいってもんじゃないでしょ。」コスパという言葉が好き。でもそれは「安いものを選ぶ」という意味じゃなくて、「払った分だけちゃんと返ってくるか」を見ている。実は見た目にもこだわりたいけど、それを口に出すのは少し照れくさいタイプ。',
        personality: '家づくりでも「坪単価」より「暮らしやすさ単価」で考える人。動線、収納、メンテナンス性。地味だけど毎日効いてくるポイントを見逃さない。'
    },
    {
        typeName: '毎日の動作にこだわる丁寧な暮らし派',
        description: '「前かがみになるのが地味にストレスなんですよね。」日々の小さな動作、小さな不便を見逃さない人。家づくりにおいても「使いやすさ」が最優先。インスタ映えより、10年後も快適かどうかを考えている。',
        personality: 'スイッチの高さ、コンセントの位置、収納の奥行き。住んでから気づく人が多い「日常の使い勝手」に最初から目が向いている稀有なタイプ。'
    },
    {
        typeName: 'コスパと使いやすさを両立させる現実派',
        description: '「溜めておく方がストレス。」少量でもこまめに回したいし、ランニングコストも抑えたい。全部を完璧にするより、毎日ちょうどいいラインを探すのが得意。家づくりでも「ここは削っていい、ここは譲れない」の線引きが明確。',
        personality: '予算配分が上手い人。限られた予算の中で、満足度を最大化する方法を見つけるのが得意。工務店側としては、一番提案しがいのあるタイプかもしれない。'
    },
    {
        typeName: '自由度重視のフレキシブル派',
        description: '「まず使ってみて、ダメなら変えればいい。」完璧を目指すより、まず動いてみるタイプ。食洗機も据え置きなら置き場所を変えられるし、壊れても安く買い替えられる。家づくりにもその「軽やかさ」が表れる。',
        personality: '家づくりでも「あとから変えられる余白」を大事にする人。造作で可変性を持たせたり、将来のリフォームを見越した間取りを好む。変化を恐れない柔軟さが魅力。'
    }
];

const questions = [
    {
        num: 1, label: '片付けのタイミング',
        text: '夕食の後片付け、どんな感じですか？',
        options: [
            { text: '食べ終わったらすぐセットして、あとはスイッチを押すだけにしたい', scores: [2,2,2,1,1,2] },
            { text: '汚れがひどいものは先に手で洗って、あとは食洗機に任せればいい', scores: [1,1,1,1,1,1] },
            { text: 'シンクに汚れ物が溜まっていく方がストレス。こまめに回したい', scores: [0,0,1,1,2,2] }
        ]
    },
    {
        num: 2, label: '回す頻度',
        text: '朝食の食器（少量の洗い物）、どうしますか？',
        options: [
            { text: '朝のうちにさっと回してしまいたい', scores: [0,1,1,1,2,2] },
            { text: '夜のぶんとまとめて、1日1回でいい', scores: [2,2,2,1,0,1] },
            { text: 'とにかく手早く片付けられれば何でもいい', scores: [1,1,1,1,1,1] }
        ]
    },
    {
        num: 3, label: '途中で追加したくなるか',
        text: '食洗機を回しているとき、「あ、これも入れたい」と思うことはありそう？',
        options: [
            { text: 'よくある。途中で気づいて追加しそう', scores: [2,2,2,0,0,2] },
            { text: 'あまりない。まとめてセットする方', scores: [2,2,2,2,2,2] }
        ]
    },
    {
        num: 4, label: '毎日の動作',
        text: '食器を入れるとき、体の動きのイメージは？',
        options: [
            { text: 'できれば立ったまま入れたい。前かがみは地味にストレス', scores: [0,0,0,2,2,2] },
            { text: '多少かがんでも気にならない。使いやすければ十分', scores: [2,2,2,2,2,2] }
        ]
    },
    {
        num: 5, label: '何を洗わせたいか',
        text: 'フライパンや鍋、大きめの食器はどうしますか？',
        options: [
            { text: 'なるべく食洗機に入れたい。手で洗うのは最小限に', scores: [2,1,1,1,0,1] },
            { text: '大物は手洗いでいい。普段の食器メインで十分', scores: [1,1,1,1,2,2] }
        ]
    },
    {
        num: 6, label: '衛生への関心',
        text: '食洗機には高温による消毒効果があると聞いたら？',
        options: [
            { text: 'それが一番の魅力。なるべく全部通したい', scores: [2,2,2,2,2,2] },
            { text: '洗えればそれでいい。消毒はそこまで気にしない', scores: [1,1,1,1,1,1] }
        ]
    },
    {
        num: 7, label: '音の気になり方',
        text: 'キッチンと寝室や子ども部屋の距離感は？',
        options: [
            { text: 'わりと近い。夜遅くに回すこともあるので、静かな方がいい', scores: [2,2,1,1,1,0] },
            { text: '離れているか、多少の音では目が覚めないので気にしない', scores: [1,1,1,1,1,1] }
        ]
    },
    {
        num: 8, label: '設置イメージ',
        text: '食洗機の設置イメージ、どちらに近いですか？',
        options: [
            { text: 'システムキッチンに最初から組み込みたい', scores: [2,2,2,2,2,0] },
            { text: '造作で置き場を工夫した据え置き型でもいい', scores: [0,0,0,0,0,100] }
        ]
    },
    {
        num: 9, label: 'キッチンの見た目',
        text: 'キッチンまわりの雰囲気として、どちらに近いですか？',
        options: [
            { text: '機械の存在感は消したい。できるだけすっきり見せたい', scores: [2,2,2,2,2,0] },
            { text: '使いやすければ、見た目にはそこまでこだわらない', scores: [1,1,1,1,1,1] }
        ]
    },
    {
        num: 10, label: 'コスト感',
        text: '食洗機は「中の量に関係なく1回のコストは固定」。どう使う？',
        options: [
            { text: 'まとめて1日1〜2回に抑えたい', scores: [2,2,2,2,0,1] },
            { text: 'こまめに回したい。溜めておく方がストレス', scores: [0,1,1,1,2,2] }
        ]
    }
];

// ===== ステート =====
let currentQ = 0;
let totalScores = [0, 0, 0, 0, 0, 0];

// ===== 関数 =====
function startQuiz() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('progressWrap').classList.remove('hidden');
    document.getElementById('quizScreen').classList.remove('hidden');
    currentQ = 0;
    totalScores = [0, 0, 0, 0, 0, 0];
    renderQuestion();
}

function renderQuestion() {
    const q = questions[currentQ];
    const pct = (currentQ / questions.length) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = (currentQ + 1) + ' / ' + questions.length;

    let html = `
        <div class="question-card" key="${currentQ}">
            <span class="q-number">Q${q.num}</span>
            <div class="q-label">${q.label}</div>
            <div class="q-text">${q.text}</div>
            <div class="options">
    `;
    q.options.forEach((opt, i) => {
        html += `<button class="option-btn" onclick="selectOption(${i})">${opt.text}</button>`;
    });
    html += '</div></div>';
    document.getElementById('quizScreen').innerHTML = html;
}

function selectOption(optIndex) {
    const scores = questions[currentQ].options[optIndex].scores;
    for (let i = 0; i < 6; i++) {
        totalScores[i] += scores[i];
    }
    currentQ++;
    if (currentQ < questions.length) {
        renderQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressText').textContent = '完了！';
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');

    // スコア順にソート
    let ranked = totalScores.map((s, i) => ({ score: s, index: i }));
    ranked.sort((a, b) => b.score - a.score);

    const top = ranked[0];
    const second = ranked[1];
    const m = machines[top.index];
    const profile = typeProfiles[top.index];
    const m2 = machines[second.index];

    let html = `
        <div class="result-card">
            <div class="result-badge">あなたの食洗機タイプ</div>
            <div class="result-type">${profile.typeName}</div>
            <div class="result-description">${profile.description}</div>

            <div class="result-spec">
                <h4>おすすめ機種</h4>
                <div class="result-spec-row">
                    <span class="result-spec-label">タイプ</span>
                    <span class="result-spec-value">${m.name}</span>
                </div>
                <div class="result-spec-row">
                    <span class="result-spec-label">価格帯</span>
                    <span class="result-spec-value">${m.price}</span>
                </div>
                <div class="result-spec-row">
                    <span class="result-spec-label">メーカー</span>
                    <span class="result-spec-value">${m.makers}</span>
                </div>
                <div class="result-spec-row">
                    <span class="result-spec-label">特徴</span>
                    <span class="result-spec-value">${m.feature}</span>
                </div>
            </div>

            <div class="result-personality">
                <h4>🏠 あなたの家づくりの傾向</h4>
                <p>${profile.personality}</p>
            </div>

            <div class="runner-up">
                <h4>次点のタイプ</h4>
                <p><strong>${m2.short}</strong>（${m2.price}）も合っているかもしれません。</p>
            </div>

            <button class="retry-btn" onclick="retryQuiz()">もう一度やってみる</button>
        </div>
    `;
    document.getElementById('resultScreen').innerHTML = html;
}

function retryQuiz() {
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('resultScreen').innerHTML = '';
    startQuiz();
}
</script>

</body>
</html>
