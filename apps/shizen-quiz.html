<style>

.btn-choice.yes:hover{border-color:var(--yes);background:#edf5ee}.btn-choice.mid:hover{border-color:var(--mid);background:#f5efe6}.btn-choice.no:hover{border-color:var(--no);background:#f5ede6}

<body>
<div class="app">

<script>
var Q=[
{id:'Q1',n:'内装仕上げ',
s:'たとえば、杉の無垢床。素足で歩けば夏はさらっと、冬はほんのり温かい。でも、物を落とせば凹み、暮らすほどに傷の跡が増えていく。',
t:'内装の仕上げに、こうした自然素材を取り入れたいですか？',
a:{l:'多少の傷や変化があっても、自然素材の質感で暮らしたい',v:20,c:'傷や色の変化を「暮らしの記録」と捉えられるあなたは、自然素材の内装と長く心地よい関係を築けます。無垢材の床は時間とともに色が深まり、世界にひとつだけの表情になっていきます。'},
b:{l:'素材や場所を選んで、自然素材と機能素材を使い分けたい',v:10,c:'リビングや寝室など長い時間を過ごす場所に自然素材を、水回りや子供部屋には機能素材を。場所ごとに使い分ける方法は、心地よさとメンテナンスのバランスがもっとも取りやすい現実的な選択です。'},
c:{l:'耐久性やメンテナンスのしやすさで選びたい',v:0,c:'実用性を最優先にする判断は、とても合理的です。最近の複合フローリングは見た目も質感も進化していて、メンテナンスの手間を減らしながら心地よい空間をつくれます。'}},
{id:'Q2',n:'外装仕上げ',
s:'たとえば、焼杉や杉板の外壁。年月とともに表情が変わり、街並みに溶け込む風格が出てくる。でも、サイディングやガルバリウムならメンテナンスの手間と頻度はぐっと少なくなる。',
t:'外装に、経年変化する自然素材を選びたいですか？',
a:{l:'手間がかかっても、時間とともに味が出る外装がいい',v:20,c:'焼杉や板張りの外壁は、年月とともに「古びる」のではなく「深まる」ように変化します。建物が街の風景の一部になっていく過程を楽しめるのは、自然素材の外装ならではの体験です。'},
b:{l:'自然な風合いは好きだけど、保護塗装などで手間を減らしたい',v:10,c:'木材に適切な保護塗装を施せば、自然の風合いを保ちながらメンテナンス間隔を延ばせます。見た目の温かさと現実的な維持管理を両立する、賢い落としどころです。'},
c:{l:'外装はメンテナンスの少なさで選びたい',v:0,c:'外装は風雨に直接さらされる場所。メンテナンス性を重視するのは、長い目で見てとても実用的な判断です。高性能なサイディングやガルバリウムの外装なら、質感も向上しデザインの選択肢も豊富にあります。'}},
{id:'Q3',n:'構造・断熱',
s:'たとえば、無垢材の柱梁やセルロースファイバーの断熱。住んでからの空気感が違うと言われる。でも、見えない部分だけで数十万円の差額が出る。',
t:'見えない部分にも、自然素材を使いたいですか？',
a:{l:'見えない部分こそ、家の空気をつくる土台だと思う',v:20,c:'無垢材の調湿やセルロースファイバーの吸放湿性は、住んでからの空気感として毎日感じ続けるものです。完成すれば見えなくなる部分にこそこだわるのは、暮らしの質への本質的な投資です。'},
b:{l:'全部は難しくても、断熱材など一部だけでも自然素材を選びたい',v:10,c:'構造は集成材の寸法安定性に任せて、断熱材にセルロースファイバーを選ぶ。要所を絞って自然素材を入れる方法は、コストと効果のバランスに優れた判断です。'},
c:{l:'見えない部分はコストと性能で合理的に選びたい',v:0,c:'集成材の安定性やグラスウールのコストパフォーマンスは、長年の実績に裏打ちされた確かな選択です。見えない部分を抑えた分、他の場所に予算を回すのも賢い判断です。'}},
{id:'Q4',n:'設備',
s:'たとえば、家具大工が組む造作キッチンや、タイル職人が仕上げる在来浴室。手仕事ならではの存在感がある。でも、システムキッチンやユニットバスの方が掃除も交換もしやすい。',
t:'設備にも、手仕事や自然素材の質感を求めますか？',
a:{l:'手仕事の質感は、暮らしの満足度に直結すると思う',v:20,c:'職人の手で仕上げられた設備には、量産品にはない質感と存在感があります。毎日使う場所だからこそ、触れるたびに感じる心地よさが、暮らしの満足度を静かに支え続けます。'},
b:{l:'自然素材の質感を取り入れたシステム品で、使いやすさと両立したい',v:10,c:'キッチンのカウンターはしっかりコーティングされた無垢材のシステムキッチンで、浴室はユニットバスで。自然素材の質感をシステム品の使いやすさに乗せることで、心地よさとメンテナンス性を両立できます。'},
c:{l:'設備は実用性と掃除のしやすさで選びたい',v:0,c:'システムキッチンやユニットバスは、掃除のしやすさ・防水性・交換の容易さが高い水準にまとまっています。毎日使う場所だからこそ、実用性を最優先にするのは合理的な選択です。'}},
{id:'Q5',n:'設計思想',
s:'たとえば、深い軒で夏の日射を遮り、窓の配置で風の通り道をつくる設計。エアコンに頼る前に、建物そのもので暑さ寒さをやわらげる工夫がある。',
t:'家の快適さを、設備よりも建物の設計で実現したいですか？',
a:{l:'建物の設計で自然に調整する考え方が好きだ',v:20,c:'深い軒、風の通り道、適切な窓の位置 ── 建物に組み込まれた快適性は、設備のように壊れることがなく、ランニングコストもかかりません。自然の力を設計に取り込む考え方は、家が長く快適であり続けるための知恵です。'},
b:{l:'設計の工夫は取り入れつつ、冷暖房機器もしっかり活用してバランスを取りたい',v:10,c:'パッシブ設計で基本的な心地よさを確保しながら、冷暖房機器もしっかり活用してバランスよく暮らす。自然と設備のいいとこ取りは、日本の四季に合った現実的な選択です。'},
c:{l:'快適さは高性能な空調設備で確実に確保したい',v:0,c:'全館空調や高性能エアコンは、どんな気候でも室内を一定に保てる確実性があります。設計に頼らず設備で快適さを担保するのは、現代の住宅性能を最大限に活かす合理的な方法です。'}}
];
var R=[
{min:80,t:'徹底自然派',b:'内装から構造、設備、設計思想まで、暮らしのすみずみに自然の質感を求めるタイプ。メンテナンスの手間すら「暮らしの一部」として楽しめる姿勢があります。自然素材の家づくりを得意とする工務店や設計事務所との相性がとても良いでしょう。'},
{min:60,t:'自然派寄り',b:'自然素材の良さをよく理解したうえで、現実的なバランス感覚も持ち合わせています。すべてを自然素材にするのではなく、「ここぞ」という場所に重点的に取り入れる選択ができるタイプ。この感覚は、実は家づくりのプロがもっとも共感しやすいバランスです。'},
{min:40,t:'バランス型',b:'自然素材の魅力も機能素材の合理性も、どちらも冷静に見れるタイプ。こだわる場所にはこだわり、割り切る場所は割り切る。そんなメリハリのある家づくりが向いています。'},
{min:20,t:'機能寄り',b:'実用性やメンテナンス性を重視する堅実な考え方。自然素材の良さは理解していても、日々の暮らしやすさを優先できるのは、長く住む家を選ぶうえで大切な判断力です。アクセントとして一部に自然素材を取り入れる方法もあります。'},
{min:0,t:'機能重視型',b:'メンテナンス性・耐久性・合理性を最優先にする、とても堅実な家づくりの考え方です。自然素材にこだわらなくても、高品質な機能素材で快適で美しい住まいは十分に実現できます。予算を断熱や耐震などの性能に集中させるのも賢い選択です。'}
];
var A=[],ci=0;
function sw(id){var s=document.querySelectorAll('.screen');for(var i=0;i<s.length;i++)s[i].classList.remove('active');var e=document.getElementById(id);e.classList.remove('active');void e.offsetWidth;e.classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}
function start(){A=[];ci=0;rq();sw('s-q')}
function restart(){A=[];ci=0;sw('s-top')}
function back(){if(ci>0){ci--;A.pop();rq()}}
function rq(){var q=Q[ci],d='';for(var i=0;i<Q.length;i++){var cls=i<ci?'done':i===ci?'current':'';d+='<div class="q-dot '+cls+'"></div>'}document.getElementById('qp').innerHTML=d;document.getElementById('qn').textContent='質問 '+(ci+1)+' / '+Q.length;document.getElementById('qs').textContent=q.s;document.getElementById('qt').textContent=q.t;var h='';h+='<button class="btn-choice yes" onclick="ans(\'a\')"><span class="choice-icon">○</span><span>'+q.a.l+'</span></button>';h+='<button class="btn-choice mid" onclick="ans(\'b\')"><span class="choice-icon">△</span><span>'+q.b.l+'</span></button>';h+='<button class="btn-choice no" onclick="ans(\'c\')"><span class="choice-icon">×</span><span>'+q.c.l+'</span></button>';document.getElementById('qc').innerHTML=h;document.getElementById('bb').style.display=ci===0?'none':'inline-flex'}
function ans(k){A.push(k);ci++;if(ci<Q.length){rq();sw('s-q')}else{sr()}}
function sr(){var sc=0;for(var i=0;i<A.length;i++)sc+=Q[i][A[i]].v;document.getElementById('rsc').textContent=sc+'%';document.getElementById('rbf').style.width=sc+'%';var tier=R[R.length-1];for(var i=0;i<R.length;i++){if(sc>=R[i].min){tier=R[i];break}}document.getElementById('rty').textContent=tier.t;document.getElementById('rb').textContent=tier.b;var ra=document.getElementById('ra');ra.innerHTML='';var icons={a:'○',b:'△',c:'×'};var cls={a:'yes',b:'mid',c:'no'};for(var i=0;i<Q.length;i++){var q=Q[i],k=A[i],ch=q[k];var d=document.createElement('div');d.className='r-qa '+cls[k];var hd=document.createElement('div');hd.className='r-qa-head';hd.innerHTML=q.n+' <span class="r-qa-icon">'+icons[k]+'</span>';d.appendChild(hd);var tx=document.createElement('div');tx.className='r-qa-text';tx.textContent=ch.c;d.appendChild(tx);ra.appendChild(d)}sw('s-r')}
</script>
</body>
</html>
