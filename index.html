<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>荻野ラボ｜暮らしと家づくりの実験室</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f5f0;
            --card: #ffffff;
            --primary: #5b8a72;
            --primary-light: #e8f0ec;
            --primary-dark: #3d6b54;
            --accent: #d4956a;
            --text: #3a3a3a;
            --text-light: #8a8a8a;
            --border: #e8e4df;
            --shadow: 0 2px 20px rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .hero {
            text-align: center;
            padding: 64px 20px 48px;
            background: linear-gradient(160deg, #e8f0ec 0%, #f5ebe3 50%, #faf8f5 100%);
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 200px; height: 200px;
            background: rgba(91,138,114,0.06);
            border-radius: 50%;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -40px; left: -40px;
            width: 160px; height: 160px;
            background: rgba(212,149,106,0.06);
            border-radius: 50%;
        }
        .hero-icon {
            font-size: 40px;
            margin-bottom: 16px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .hero h1 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .hero .subtitle {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 4px;
        }
        .hero .desc {
            font-size: 13px;
            color: var(--text-light);
            max-width: 360px;
            margin: 12px auto 0;
            line-height: 1.8;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .section-label {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .app-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .app-card {
            background: var(--card);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 24px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }
        .app-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 28px rgba(0,0,0,0.1);
            border-color: var(--primary);
        }
        .app-icon {
            font-size: 36px;
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            border-radius: 12px;
        }
        .app-info { flex: 1; }
        .app-info h3 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text);
        }
        .app-info p {
            font-size: 13px;
            color: var(--text-light);
            line-height: 1.6;
        }
        .app-tag {
            display: inline-block;
            font-size: 11px;
            background: var(--primary-light);
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 10px;
            margin-top: 8px;
            font-weight: 600;
        }
        .app-tag.coming {
            background: #f0e8e0;
            color: var(--accent);
        }

        .footer {
            text-align: center;
            padding: 24px 20px 40px;
            font-size: 12px;
            color: var(--text-light);
        }
        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-icon">🧪</div>
    <h1>荻野ラボ</h1>
    <p class="subtitle">暮らしと家づくりの実験室</p>
    <p class="desc">家づくりのヒントになるツールや診断を、ひとつずつ作っています。</p>
</div>

<div class="container">
    <div class="section-label">ミニアプリ</div>
    <div class="app-grid">

        <a href="dishwasher-quiz.html" class="app-card">
            <div class="app-icon">🍽️</div>
            <div class="app-info">
                <h3>食洗機占い</h3>
                <p>10の質問に答えるだけで、あなたにぴったりの食洗機タイプと家づくりの傾向がわかります。</p>
                <span class="app-tag">診断ツール</span>
            </div>
        </a>

        <div class="app-card" style="opacity:0.5; cursor:default;">
            <div class="app-icon" style="background:#f0e8e0;">🏠</div>
            <div class="app-info">
                <h3>家づくりの「絶対ない」を探す</h3>
                <p>1000の質問であなたの家づくりの価値観を明確にする診断ツール。</p>
                <span class="app-tag coming">準備中</span>
            </div>
        </div>

        <div class="app-card" style="opacity:0.5; cursor:default;">
            <div class="app-icon" style="background:#f0e8e0;">⚡</div>
            <div class="app-info">
                <h3>省エネ診断シミュレーター</h3>
                <p>断熱性能と設備の組み合わせで光熱費の目安がわかります。</p>
                <span class="app-tag coming">準備中</span>
            </div>
        </div>

    </div>
</div>

<div class="footer">
    <p>荻野ラボ｜<a href="https://www.hagimori-kensetsu.com/" target="_blank">萩森建設</a></p>
</div>

</body>
</html>
