<!DOCTYPE html>
<!--
  荻野ラボ｜暮らしと家づくりの実験室
  © 萩森建設 荻野 | hagimori-kensetsu@xxx.co.jp
-->
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>荻野ラボ｜暮らしと家づくりの実験室</title>
    <meta name="description" content="家づくりのヒントになるツールや診断を、ひとつずつ作っています。萩森建設 荻野が運営する実験サイトです。">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #faf6f1;
            --card: #ffffff;
            --primary: #8b6f47;
            --primary-light: #c4a882;
            --primary-dark: #6b5535;
            --accent: #d4a76a;
            --text: #3d3225;
            --text-light: #7a6b5a;
            --border: #e8ddd0;
        }
        html { font-size: 16px; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            min-height: 100dvh;
        }
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
        }
        .hero-icon { font-size: 3rem; margin-bottom: 8px; }
        .hero h1 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 0.95rem;
            color: var(--primary-light);
            font-weight: 500;
            margin-bottom: 16px;
        }
        .desc {
            font-size: 0.9rem;
            color: var(--text-light);
            max-width: 400px;
            margin: 0 auto;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }
        .section-label {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary-light);
            margin-bottom: 12px;
        }
        .app-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .app-card {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
        }
        a.app-card:hover {
            border-color: var(--primary-light);
            box-shadow: 0 4px 16px rgba(100, 80, 50, 0.1);
            transform: translateY(-2px);
        }
        .app-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #f5efe6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .app-info h3 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 4px;
        }
        .app-info p {
            font-size: 0.85rem;
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .app-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            background: var(--primary);
            color: #fff;
        }
        .app-tag.coming {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent);
        }
        .footer {
            text-align: center;
            padding: 24px 20px 40px;
            font-size: 12px;
            color: var(--text-light);
        }
        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-icon">🧪</div>
    <h1>荻野ラボ</h1>
    <p class="subtitle">暮らしと家づくりの実験室</p>
    <p class="desc">家づくりのヒントになるツールや診断を、ひとつずつ作っています。</p>
</div>

<div class="container">
    <div class="section-label">ミニアプリ</div>
    <div class="app-grid">

        <a href="dishwasher-quiz.html" class="app-card">
            <div class="app-icon">🍽️</div>
            <div class="app-info">
                <h3>食洗機占い</h3>
                <p>6つの質問に答えるだけで、あなたにぴったりの食洗機タイプがわかります。</p>
                <span class="app-tag">診断ツール</span>
            </div>
        </a>

        <div class="app-card" style="opacity:0.5; cursor:default;">
            <div class="app-icon" style="background:#f0e8e0;">🏠</div>
            <div class="app-info">
                <h3>家づくりの「絶対ない」を探す</h3>
                <p>1000の質問であなたの家づくりの価値観を明確にする診断ツール。</p>
                <span class="app-tag coming">準備中</span>
            </div>
        </div>

        <div class="app-card" style="opacity:0.5; cursor:default;">
            <div class="app-icon" style="background:#f0e8e0;">⚡</div>
            <div class="app-info">
                <h3>省エネ診断シミュレーター</h3>
                <p>断熱性能と設備の組み合わせで光熱費の目安がわかります。</p>
                <span class="app-tag coming">準備中</span>
            </div>
        </div>

    </div>
</div>

<div class="footer">
    <p>荻野ラボ｜<a href="https://www.hagimori-kensetsu.com/" target="_blank">萩森建設</a></p>
</div>

</body>
</html>
