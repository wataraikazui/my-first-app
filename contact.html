<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜YKTラボ</title>
<meta name="description" content="YKTラボへのお問い合わせ。研究テーマへの参加や、ご質問をお受けしています。">
<meta property="og:title" content="お問い合わせ｜YKTラボ">
<meta property="og:description" content="YKTラボへのお問い合わせ。">
<meta property="og:type" content="website">
<meta property="og:locale" content="ja_JP">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f5f0;--card:#fff;--main:#5b8a72;--main-light:#e8f0ec;--accent:#d4956a;--text:#3a3a3a;--text-light:#8a8a8a;--border:#e0dcd4;--fd:'Zen Maru Gothic',sans-serif;--fb:'Noto Sans JP',sans-serif}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--text);line-height:1.9;min-height:100dvh;display:flex;flex-direction:column}
main{flex:1}
.top-link{display:inline-flex;align-items:center;gap:6px;margin:20px 0 0 20px;font-size:.8rem;color:var(--text-light);text-decoration:none;transition:color .2s}.top-link:hover{color:var(--main)}
.page{max-width:640px;margin:0 auto;padding:32px 20px 48px;width:100%}
.page-title{font-family:var(--fd);font-size:1.5rem;font-weight:700;color:var(--main);margin-bottom:12px;line-height:1.4}
.page-note{font-size:.82rem;color:var(--text-light);margin-bottom:28px;line-height:1.8}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px 24px;box-shadow:0 2px 12px rgba(90,80,60,.04)}
.form-group{margin-bottom:20px}
.form-label{display:block;font-family:var(--fd);font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:6px}
.form-label .req{font-size:.7rem;color:var(--accent);margin-left:4px;font-weight:500}
.form-input,.form-textarea{width:100%;padding:10px 14px;font-family:var(--fb);font-size:.9rem;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;transition:border-color .2s;line-height:1.7}
.form-input:focus,.form-textarea:focus{outline:none;border-color:var(--main)}
.form-textarea{min-height:140px;resize:vertical}
.form-submit{display:block;width:100%;padding:14px;font-family:var(--fd);font-size:1rem;font-weight:700;color:#fff;background:var(--main);border:none;border-radius:60px;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(91,138,114,.2)}
.form-submit:hover{background:#47705b;transform:translateY(-1px)}
.form-note{font-size:.78rem;color:var(--text-light);margin-top:16px;line-height:1.8;text-align:center}
.footer{text-align:center;padding:24px 20px 32px;font-size:.75rem;color:var(--text-light);line-height:1.8;border-top:1px solid var(--border);background:var(--card)}
@media(max-width:480px){.page-title{font-size:1.3rem}.form-card{padding:22px 18px}.page{padding:24px 16px 40px}}
</style>
</head>
<body>
<main>
<a href="index.html" class="top-link">&#8592; YKTラボ トップへ</a>
<div class="page">
  <h1 class="page-title">お問い合わせ</h1>
  <p class="page-note">研究テーマへの参加、占い・クイズについてのご質問など、お気軽にどうぞ。<br>営業のご連絡はご遠慮ください。返信にはお時間をいただく場合があります。</p>

  <div class="form-card">
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <div class="form-group">
        <label class="form-label" for="name">お名前<span class="req">必須</span></label>
        <input class="form-input" type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="org">ご所属</label>
        <input class="form-input" type="text" id="org" name="organization" placeholder="会社名・屋号など（任意）">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">メールアドレス<span class="req">必須</span></label>
        <input class="form-input" type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="message">お問い合わせ内容<span class="req">必須</span></label>
        <textarea class="form-textarea" id="message" name="message" required></textarea>
      </div>
      <button class="form-submit" type="submit">送信する</button>
      <p class="form-note">送信後、入力いただいたメールアドレスに確認をお送りします。</p>
    </form>
  </div>
</div>
</main>
<footer class="footer">
  YKTラボ / 荻野 尚志<br>
  &copy; YKTラボ | says@o-h.co.jp
</footer>
</body>
</html>
